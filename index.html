<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#14191a">
<title>Deck 53 · Painel</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ===================== TELA DE LOGIN ===================== -->
<div class="login-screen" id="login-screen">
  <div class="login-brand">DECK <span>53</span></div>
  <div class="login-subtitle">Painel do dono · estoque & caixa</div>

  <div class="auth-tabs">
    <div class="auth-tab active" data-mode="signin">Entrar</div>
    <div class="auth-tab" data-mode="signup">Criar conta</div>
  </div>

  <div class="auth-error" id="auth-error"></div>

  <div class="field">
    <label>E-mail</label>
    <input type="email" id="auth-email" placeholder="voce@exemplo.com">
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="auth-password" placeholder="••••••••">
  </div>
  <button class="btn btn-primary btn-block" id="auth-submit" onclick="handleAuthSubmit()">Entrar</button>
  <div style="text-align:center; margin-top:16px;">
    <span class="link-plain" onclick="continueOffline()">Continuar sem internet (dados já salvos neste aparelho)</span>
  </div>
</div>

<!-- ===================== APP PRINCIPAL ===================== -->
<div class="app" id="app-root" style="display:none;">

  <header>
    <img class="badge53" src="icons/icon-192.png" alt="Deck 53">
    <div class="header-top">
      <div>
        <div class="brand">DECK <span>53</span></div>
        <div class="subtitle">Painel do dono · estoque & caixa</div>
      </div>
    </div>
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">Verificando conexão…</span>
    </div>
    <div class="planks"></div>
  </header>

  <main>
    <section class="tab-panel active" id="tab-estoque">
      <div class="section-row">
        <div class="section-title">Estoque</div>
        <button class="btn btn-primary btn-sm" onclick="openProductModal()">+ Produto</button>
      </div>
      <div id="product-list"></div>
    </section>

    <section class="tab-panel" id="tab-vender">
      <div class="section-row"><div class="section-title">Registrar venda</div></div>
      <div class="card" id="sell-card"></div>
      <div class="plank-divider"></div>
      <div class="section-row"><div class="section-title" style="font-size:17px;">Vendas de hoje</div></div>
      <div id="today-sales"></div>
    </section>

    <section class="tab-panel" id="tab-painel">
      <div class="section-row"><div class="section-title">Painel financeiro</div></div>
      <div class="period-tabs" id="period-tabs">
        <div class="period-tab active" data-period="hoje">Hoje</div>
        <div class="period-tab" data-period="semana">Semana</div>
        <div class="period-tab" data-period="mes">Mês</div>
        <div class="period-tab" data-period="tudo">Tudo</div>
      </div>
      <div id="dashboard-content"></div>
    </section>
  </main>

  <nav>
    <button class="nav-btn active" data-tab="estoque" onclick="switchTab('estoque')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 12l9 4 9-4"/><path d="M3 17l9 4 9-4"/></svg>
      Estoque
    </button>
    <button class="nav-btn" data-tab="vender" onclick="switchTab('vender')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
      Vender
    </button>
    <button class="nav-btn" data-tab="painel" onclick="switchTab('painel')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7"/></svg>
      Painel
    </button>
  </nav>
</div>

<!-- Product modal -->
<div class="overlay" id="product-overlay">
  <div class="modal">
    <div class="modal-title" id="product-modal-title">Novo produto</div>
    <input type="hidden" id="product-id">
    <div class="field"><label>Nome do produto</label><input type="text" id="p-nome" placeholder="Ex: Chopp Pilsen 500ml"></div>
    <div class="field"><label>Categoria</label><input type="text" id="p-categoria" placeholder="Ex: Bebidas, Petiscos, Drinks"></div>
    <div class="field-row">
      <div class="field"><label>Preço de custo (R$)</label><input type="number" step="0.01" id="p-custo" placeholder="0,00"></div>
      <div class="field"><label>Preço de venda (R$)</label><input type="number" step="0.01" id="p-venda" placeholder="0,00"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Estoque atual</label><input type="number" id="p-estoque" placeholder="0"></div>
      <div class="field"><label>Estoque mínimo</label><input type="number" id="p-minimo" placeholder="5"></div>
    </div>
    <button class="btn btn-primary btn-block" onclick="saveProduct()">Salvar produto</button>
  </div>
</div>

<!-- Restock modal -->
<div class="overlay" id="restock-overlay">
  <div class="modal">
    <div class="modal-title">Repor estoque</div>
    <div id="restock-product-name" style="margin-bottom:14px; color:var(--text-dim); font-size:14px;"></div>
    <input type="hidden" id="restock-id">
    <div class="field"><label>Quantidade a adicionar</label><input type="number" id="restock-qty" placeholder="0"></div>
    <button class="btn btn-primary btn-block" onclick="confirmRestock()">Adicionar ao estoque</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/db.js"></script>
<script src="js/app.js"></script>
</body>
</html>
